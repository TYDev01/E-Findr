services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    depends_on:
      - api

  api:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    depends_on:
      - postgres
      - redis

  ai-service:
    build: ./ai
    ports:
      - "8001:8001"
    env_file:
      - ./.env

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: efindr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:

