services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    depends_on:
      - api

  api:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    depends_on:
      - postgres
      - redis

  worker:
    build: ./backend
    command: ["efindr-worker"]
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      - api
      - redis

  ai-service:
    build: ./ai
    ports:
      - "8001:8001"
    restart: unless-stopped
    env_file:
      - ./.env

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: efindr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  postgres_data:
